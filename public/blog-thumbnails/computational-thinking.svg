<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#431407"/>
      <stop offset="0.55" stop-color="#ea580c"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow3" cx="0" cy="0" r="1" gradientTransform="translate(640 380) rotate(-120) scale(340)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fed7aa" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#fed7aa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg3)"/>
  <rect width="800" height="450" fill="url(#grid3)"/>
  <rect width="800" height="450" fill="url(#glow3)"/>

  <!-- big code brackets -->
  <text x="70" y="300" font-family="'Consolas', 'Courier New', monospace" font-size="240" font-weight="700" fill="#fff7ed" fill-opacity="0.92">&lt;/&gt;</text>

  <!-- binary column -->
  <g font-family="'Consolas','Courier New',monospace" font-size="24" fill="#ffedd5" fill-opacity="0.75">
    <text x="560" y="120">1 0 1 1 0</text>
    <text x="560" y="160">0 1 1 0 1</text>
    <text x="560" y="200">1 1 0 0 1</text>
    <text x="560" y="240">0 1 0 1 1</text>
  </g>

  <!-- flow nodes -->
  <g>
    <rect x="560" y="285" width="70" height="42" rx="10" fill="#fff7ed" fill-opacity="0.9"/>
    <rect x="670" y="285" width="70" height="42" rx="10" fill="none" stroke="#fff7ed" stroke-width="3"/>
    <line x1="630" y1="306" x2="670" y2="306" stroke="#fff7ed" stroke-width="3"/>
  </g>

  <text x="70" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="3" fill="#ffffff" fill-opacity="0.9">COMPUTATIONAL THINKING</text>
</svg>
