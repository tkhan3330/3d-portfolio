<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" fill="none">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c1a3a"/>
      <stop offset="0.55" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow4" cx="0" cy="0" r="1" gradientTransform="translate(400 60) rotate(90) scale(320)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#bae6fd" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#bae6fd" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid4" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg4)"/>
  <rect width="800" height="450" fill="url(#grid4)"/>
  <rect width="800" height="450" fill="url(#glow4)"/>

  <!-- candlesticks -->
  <g stroke-width="16" stroke-linecap="round">
    <g stroke="#4ade80">
      <line x1="150" y1="150" x2="150" y2="300"/>
      <line x1="150" y1="130" x2="150" y2="320" stroke-width="3"/>
      <line x1="270" y1="120" x2="270" y2="240"/>
      <line x1="270" y1="100" x2="270" y2="260" stroke-width="3"/>
      <line x1="510" y1="140" x2="510" y2="230"/>
      <line x1="510" y1="120" x2="510" y2="250" stroke-width="3"/>
      <line x1="630" y1="90" x2="630" y2="190"/>
      <line x1="630" y1="70" x2="630" y2="210" stroke-width="3"/>
    </g>
    <g stroke="#fb7185">
      <line x1="390" y1="180" x2="390" y2="320"/>
      <line x1="390" y1="160" x2="390" y2="340" stroke-width="3"/>
    </g>
  </g>

  <!-- moving average line -->
  <path d="M120 290 L 270 210 L 390 250 L 510 200 L 630 150 L 700 170" stroke="#fde68a" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="60" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="3" fill="#ffffff" fill-opacity="0.9">MATHS × MARKETS</text>
</svg>
